# Host deps: local-channel lib-foo / lib-bar; libfoo* / libbar* on disk for globs.
# Exercises build.always_include_files for the top-level artifact and for a suboutput.
package:
  name: conda-build-test-always_include_files-glob
  version: 1.0

build:
  number: 0
  always_include_files:
    - lib/libfoo*.dylib        # [osx]
    - lib/libfoo*.so*          # [linux]
    - Library/lib/libfoo*.lib  # [win]
  script:
    - echo "weee" > $PREFIX/top_level.txt   # [not win]
    - echo "weee" > %PREFIX%\top_level.txt  # [win]

requirements:
  host:
    - lib-foo 1.0.0

outputs:
  - name: subpackage
    requirements:
      host:
        - lib-bar 1.0.0
    build:
      always_include_files:
        - lib/libbar*.dylib        # [osx]
        - lib/libbar*.so*          # [linux]
        - Library/lib/libbar*.lib  # [win]
    script: echo_file.sh   # [not win]
    script: echo_file.bat  # [win]
    test:
      commands:
        - test -e $PREFIX/test.txt                              # [unix]
        - test -e $PREFIX/lib/libbar.9.dylib                   # [osx]
        - test -e $PREFIX/lib/libbar.dylib                     # [osx]
        - test -e $PREFIX/lib/libbar.so.9                      # [linux]
        - test -e $PREFIX/lib/libbar.so                        # [linux]
        - if not exist %PREFIX%\Library\lib\libbar.lib exit 1  # [win]
        - if not exist %PREFIX%\test.txt exit 1                 # [win]
